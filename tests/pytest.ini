[pytest]
# GPA Genomic Phenotype Association — Test Configuration
# Framework: pytest + pytest-asyncio + pytest-cov

# Async test mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test discovery paths
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage target: core modules >= 80%
# Note: Run pytest from the skill root dir for correct coverage paths:
#   cd /Users/zhaorongli/.workbuddy/skills/dgra-genomic-risk && pytest tests/
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=scripts
    --cov-config=.coveragerc
    --cov-report=term-missing:skip-covered
    --cov-report=html:tests/htmlcov
    --cov-report=xml:tests/coverage.xml

# Markers for test categorization
markers =
    # Layer markers
    l0: L0 Contract tests (input/output schema validation)
    l1: L1 Static tests (imports, dataclasses, circular deps)
    l2: L2 Unit tests (single module isolation)
    l3: L3 Integration tests (multi-module interaction)
    l4: L4 Performance tests (benchmarks, memory, throughput)
    l5: L5 Edge/Boundary tests (malformed data, extremes, encoding)
    l6: L6 Regression tests (backward compatibility)
    e2e: End-to-end tests (full user scenarios)

    # Feature markers
    tier: Tier classification logic
    gnomad: gnomAD frequency / population data
    clinvar: ClinVar pathogenicity / review status
    spliceai: SpliceAI splicing prediction
    nmd: Nonsense-mediated decay prediction
    phasing: Phase analysis (GATK/distance/trio)
    phaser: Phaser module tests
    multi_hit: Multi-gene hit detection
    multihit: Multi-gene hit detection (alias)
    preflight: Environment preflight checks
    transcript: Transcript selection (disease-aware)
    vcf: Raw VCF annotation pipeline
    somatic: Somatic/tumor driver mode
    pharmacogenomics: Drug metabolism gene testing
    i18n: Chinese/English internationalization
    phenotype: Phenotype matching tests
    qc: QC checks tests
    api: API module tests
    offline: Offline mode (no network)
    recording: Recording-replay mode for API calls
    replay: Replay recorded API responses (no network)
    mock: Pure mock tests (no network)
    api_online: Tests requiring real API calls
    slow: Slow tests (>5s)
    smoke: Quick smoke tests (<1s)
    regression: Version regression tests
    p0: Priority 0 — critical path
    p1: Priority 1 — important
    p2: Priority 2 — nice to have

    # Tissue context markers
    general: General tissue profile
    hematopoietic: Hematopoietic/blood tissue
    cardiovascular: Cardiovascular tissue
    hepatic: Liver tissue
    renal: Kidney tissue
    neurological: Nervous system tissue

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::RuntimeWarning:asyncio

# Timeout (requires pytest-timeout plugin; install with: pip install pytest-timeout)
# timeout = 120

# Paths for recording-replay
cache_dir = tests/.pytest_cache
